{% extends "base.html" %}

{% block content %}
<h2>商品列表</h2>
{% for product in products %}
<div class="product">
    <img src="{{ url_for('static', filename='uploads/' + product.image_filename) }}">
    <h3>{{ product.name }} - ¥{{ product.price }}</h3>
    <p>{{ product.description[:50] }}...</p>
    <a href="#">联系卖家（微信：xxx）</a>
</div>
{% endfor %}
{% endblock %}
